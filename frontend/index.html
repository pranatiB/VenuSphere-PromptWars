<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="VenueFlow — AI-powered smart stadium assistant. Navigate crowds, find food with short queues, and enjoy Championship Final 2026 at Olympic Stadium." />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="VenueFlow" />

  <title>VenueFlow — Smart Stadium Assistant</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <!-- App Shell -->
  <div id="app" role="application" aria-label="VenueFlow Stadium Assistant">
    
    <!-- Ambient Background -->
    <div class="ambient-bg" aria-hidden="true">
      <div class="ambient-orb orb-1"></div>
      <div class="ambient-orb orb-2"></div>
      <div class="ambient-orb orb-3"></div>
      <div class="ambient-mesh"></div>
    </div>

    <!-- Top Header -->
    <header id="app-header" role="banner">
      <div class="header-inner">
        <div class="header-brand">
          <svg class="brand-icon" viewBox="0 0 32 32" fill="none" aria-hidden="true" focusable="false">
            <circle cx="16" cy="16" r="14" fill="url(#brandGrad)"/>
            <path d="M10 20 Q16 8 22 20" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <circle cx="16" cy="20" r="2.5" fill="#06d6a0"/>
            <defs>
              <linearGradient id="brandGrad" x1="0" y1="0" x2="32" y2="32">
                <stop offset="0%" stop-color="#4361ee"/>
                <stop offset="100%" stop-color="#7209b7"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="brand-name">VenueFlow</span>
        </div>
        <div class="header-meta">
          <span id="phase-badge" class="phase-badge" aria-live="polite" aria-label="Current event phase">Pre-Event</span>
          <button id="btn-hc-toggle" class="icon-btn" aria-label="Toggle high contrast mode" title="High contrast">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 2v20M2 12h20" stroke-dasharray="3 3"/></svg>
          </button>
        </div>
      </div>
      <div id="announcements" role="status" aria-live="assertive" aria-atomic="true" class="announcement-bar visually-hidden"></div>
    </header>

    <!-- Main Content -->
    <main id="main-content" role="main" tabindex="-1">

      <!-- Dashboard View -->
      <section id="view-dashboard" class="view active" role="region" aria-label="Dashboard">
        <div id="dashboard-root"></div>
      </section>

      <!-- Map View -->
      <section id="view-map" class="view" role="region" aria-label="Crowd Map">
        <div id="map-root"></div>
      </section>

      <!-- Assistant View -->
      <section id="view-assistant" class="view" role="region" aria-label="AI Assistant">
        <div id="assistant-root"></div>
      </section>

      <!-- Queue Tracker View -->
      <section id="view-queue" class="view" role="region" aria-label="Queue Tracker">
        <div id="queue-root"></div>
      </section>

      <!-- Schedule View -->
      <section id="view-schedule" class="view" role="region" aria-label="Event Schedule">
        <div id="schedule-root"></div>
      </section>

    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" role="navigation" aria-label="Main navigation">
      <div class="nav-inner">
        <button class="nav-btn active" data-view="dashboard" aria-label="Dashboard" aria-current="page" id="nav-dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg>
          <span class="nav-label" data-i18n="nav.dashboard">Home</span>
        </button>
        <button class="nav-btn" data-view="map" aria-label="Crowd map" id="nav-map">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polygon points="1,6 1,22 8,18 16,22 23,18 23,2 16,6 8,2"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
          <span class="nav-label" data-i18n="nav.map">Map</span>
        </button>
        <div class="nav-fab-container">
          <button class="nav-fab" data-view="assistant" aria-label="Open AI assistant" id="nav-assistant">
            <svg class="fab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/><circle cx="9" cy="10" r="1.5" fill="currentColor"/><circle cx="12" cy="10" r="1.5" fill="currentColor"/><circle cx="15" cy="10" r="1.5" fill="currentColor"/></svg>
          </button>
        </div>
        <button class="nav-btn" data-view="queue" aria-label="Queue tracker" id="nav-queue">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
          <span class="nav-label" data-i18n="nav.queue">Queues</span>
        </button>
        <button class="nav-btn" data-view="schedule" aria-label="Event schedule" id="nav-schedule">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span class="nav-label" data-i18n="nav.schedule">Events</span>
        </button>
      </div>
    </nav>

    <!-- Settings Drawer -->
    <div id="settings-overlay" class="drawer-overlay" role="dialog" aria-modal="true" aria-label="Settings" hidden>
      <div class="drawer" id="settings-drawer">
        <div class="drawer-header">
          <h2 class="drawer-title" data-i18n="settings.title">Settings</h2>
          <button id="btn-close-settings" class="icon-btn" aria-label="Close settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div id="settings-root"></div>
      </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay" aria-busy="true" aria-label="Loading VenueFlow" role="status">
      <div class="loading-inner">
        <div class="loading-ring"></div>
        <p class="loading-text">Loading VenueFlow…</p>
      </div>
    </div>



  </div><!-- /#app -->

  <!-- Notification Toast Container -->
  <div id="toast-container" aria-live="polite" aria-atomic="false" role="status"></div>

  <!-- App Entry Point -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
